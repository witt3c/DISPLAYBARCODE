<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動條碼轉換產生器</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.4.3/dist/bwip-js-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=barcode,dark_mode,light_mode" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'><text x='0' y='20' font-family='Material Symbols Outlined' font-size='24'>barcode</text></svg>">

  <style>
    /* 確保 Icon 的垂直對齊與渲染正確 */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body id="appBody" class="bg-gray-100 min-h-screen flex flex-col transition-colors duration-300">

  <nav class="w-full bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 py-4 px-8 mb-8 transition-colors duration-300">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div class="flex items-center space-x-3">
        <span class="material-symbols-outlined text-blue-600 dark:text-blue-400 text-3xl select-none">
          barcode
        </span>
        <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100 tracking-wide transition-colors duration-300">
          自動條碼轉換產生器
        </h1>
      </div>
      
      <div class="flex items-center space-x-2 self-end sm:self-auto">
        <span class="material-symbols-outlined text-amber-500 text-xl select-none">light_mode</span>
        <button id="darkModeToggle" class="w-12 h-6 bg-gray-300 dark:bg-blue-600 rounded-full p-0.5 transition-colors duration-300 focus:outline-none cursor-pointer relative" aria-label="切換深色模式">
          <div class="w-5 h-5 bg-white rounded-full shadow-md transform duration-300 translate-x-0 dark:translate-x-6 flex items-center justify-center"></div>
        </button>
        <span class="material-symbols-outlined text-slate-400 dark:text-blue-300 text-xl select-none">dark_mode</span>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 grid grid-cols-1 md:grid-cols-2 gap-8 flex-grow w-full mb-auto transition-colors duration-300">
    
    <div class="flex flex-col justify-between items-center bg-gray-50 dark:bg-gray-900 p-6 rounded-lg border border-dashed border-gray-300 dark:border-gray-700 min-h-[450px] transition-colors duration-300">
      <h2 class="text-xl font-bold mb-4 self-start text-gray-800 dark:text-gray-200">即時預覽</h2>
      
      <div id="preview-container" class="my-auto bg-white p-0 shadow-sm flex items-center justify-center min-w-[200px] min-h-[100px] border border-gray-200 dark:border-gray-700 overflow-hidden">
        <canvas id="barcodeCanvas" class="block"></canvas>
        <div id="qrcodeContainer" class="hidden block"></div>
      </div>

      <div class="w-full grid grid-cols-2 gap-4 mt-6">
        <button id="btnDownloadPNG" class="bg-blue-600 text-white py-2 px-4 rounded shadow hover:bg-blue-700 transition font-medium cursor-pointer">下載 PNG 檔</button>
        <button id="btnDownloadSVG" class="bg-green-600 text-white py-2 px-4 rounded shadow hover:bg-green-700 transition font-medium cursor-pointer">下載 SVG 檔</button>
      </div>
    </div>

    <div class="space-y-4">
      <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-gray-200">條碼設定面板</h2>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">條碼類型</label>
        <select id="barcodeType" class="mt-1 block w-full p-2 border rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 border-gray-300 dark:border-gray-600 cursor-pointer">
          <option value="code128">Code 128</option>
          <option value="ean13">EAN-13</option>
          <option value="code39">Code 39</option>
          <option value="qrcode">QR Code</option>
          <option value="datamatrix">Data Matrix</option>
          <option value="pdf417">PDF417</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">輸入內容</label>
        <input type="text" id="barcodeText" value="12345678" class="mt-1 block w-full p-2 border rounded bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 border-gray-300 dark:border-gray-600">
      </div>

      <hr class="border-gray-200 dark:border-gray-700 my-4">

      <div id="panel-1d" class="space-y-4">
        <h3 class="font-medium text-gray-600 dark:text-gray-400">1D 條碼參數設定</h3>
        
        <div class="space-y-1">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <span>條型寬度</span>
            <span class="font-semibold text-blue-600 dark:text-blue-400" id="val-scaleX">2 px</span>
          </div>
          <input type="range" id="scaleX" value="2" min="1" max="6" step="1" class="w-full accent-blue-600 cursor-pointer">
        </div>

        <div class="space-y-1">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <span>條型總高度</span>
            <span class="font-semibold text-blue-600 dark:text-blue-400" id="val-scaleY">40 px</span>
          </div>
          <input type="range" id="scaleY" value="5" min="5" max="150" step="5" class="w-full accent-blue-600 cursor-pointer">
        </div>

        <div class="space-y-1">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <span>垂直邊距 (上下)</span>
            <span class="font-semibold text-blue-600 dark:text-blue-400" id="val-padVertical">0 px</span>
          </div>
          <input type="range" id="padVertical" value="4" min="0" max="60" step="1" class="w-full accent-blue-600 cursor-pointer">
        </div>

        <div class="space-y-1">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <span>水平邊距 (左右)</span>
            <span class="font-semibold text-blue-600 dark:text-blue-400" id="val-padHorizontal">0 px</span>
          </div>
          <input type="range" id="padHorizontal" value="4" min="0" max="100" step="1" class="w-full accent-blue-600 cursor-pointer">
        </div>

        <div class="space-y-1">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <span>字元大小</span>
            <span class="font-semibold text-blue-600 dark:text-blue-400" id="val-fontSize">11 pt</span>
          </div>
          <input type="range" id="fontSize" value="10" min="6" max="24" step="1" class="w-full accent-blue-600 cursor-pointer">
        </div>
      </div>

      <div id="panel-2d" class="space-y-4 hidden">
        <h3 class="font-medium text-gray-600 dark:text-gray-400">2D 條碼參數設定</h3>
        
        <div class="space-y-1">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <span>整體尺寸 (寬/高)</span>
            <span class="font-semibold text-blue-600 dark:text-blue-400" id="val-size2d">250 px</span>
          </div>
          <input type="range" id="size2d" value="250" min="100" max="500" step="10" class="w-full accent-blue-600 cursor-pointer">
        </div>

        <div class="space-y-1">
          <div class="flex justify-between text-sm text-gray-600 dark:text-gray-400">
            <span>周圍邊距 (Margin)</span>
            <span class="font-semibold text-blue-600 dark:text-blue-400" id="val-margin2d">0 px</span>
          </div>
          <input type="range" id="margin2d" value="0" min="0" max="50" step="1" class="w-full accent-blue-600 cursor-pointer">
        </div>

        <div id="logo-upload-container" class="pt-2">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">上傳 LOGO 圖片 (僅限 QR Code)</label>
          <input type="file" id="logoFile" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer dark:file:bg-gray-700 dark:file:text-blue-300">
        </div>
      </div>
    </div>

  </div>

  <footer class="w-full text-center py-4 text-sm text-gray-400 mt-8">
    © 2026 | witt3c digital
  </footer>

  <script>
    let uploadedLogoBase64 = null;
    let qrCodeInstance = null;

    // === 深色模式切換邏輯 ===
    const darkModeToggle = document.getElementById('darkModeToggle');
    const appBody = document.getElementById('appBody');

    darkModeToggle.addEventListener('click', () => {
      // 切換 HTML body 的 dark 類別 (讓 Tailwind dark: 生效)
      appBody.classList.toggle('dark');
    });

    const sliderMap = {
      'scaleX': 'val-scaleX',
      'scaleY': 'val-scaleY',
      'padVertical': 'val-padVertical',
      'padHorizontal': 'val-padHorizontal',
      'fontSize': 'val-fontSize',
      'size2d': 'val-size2d',
      'margin2d': 'val-margin2d'
    };

    function updateSliderLabels() {
      Object.keys(sliderMap).forEach(id => {
        const slider = document.getElementById(id);
        const label = document.getElementById(sliderMap[id]);
        const unit = id === 'fontSize' ? ' pt' : ' px';
        if (slider && label) {
          label.innerText = slider.value + unit;
        }
      });
    }

    document.getElementById('barcodeType').addEventListener('change', function(e) {
      const type = e.target.value;
      const is1D = ['code128', 'ean13', 'code39'].includes(type);
      
      document.getElementById('panel-1d').classList.toggle('hidden', !is1D);
      document.getElementById('panel-2d').classList.toggle('hidden', is1D);
      document.getElementById('logo-upload-container').classList.toggle('hidden', type !== 'qrcode');
      
      document.getElementById('barcodeCanvas').classList.toggle('hidden', type === 'qrcode');
      document.getElementById('qrcodeContainer').classList.toggle('hidden', type !== 'qrcode');

      generateBarcode();
    });

    document.getElementById('barcodeText').addEventListener('input', generateBarcode);
    
    Object.keys(sliderMap).forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        updateSliderLabels();
        generateBarcode();
      });
    });

    document.getElementById('logoFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          uploadedLogoBase64 = event.target.result;
          generateBarcode(); 
        };
        reader.readAsDataURL(file);
      }
    });

    function buildBwipOptions(type, text, is1D) {
      const typeMapping = { code128: 'code128', ean13: 'ean13', code39: 'code39', datamatrix: 'datamatrix', pdf417: 'pdf417' };
      
      let options = {
        bcid: typeMapping[type],
        text: text,
        includetext: is1D, 
        textxalign: 'center',
        inkspread: 0,
      };

      if (is1D) {
        const vMargin = parseInt(document.getElementById('padVertical').value);
        const hMargin = parseInt(document.getElementById('padHorizontal').value);
        const barHeightPx = parseInt(document.getElementById('scaleY').value);

        options.scaleX = parseFloat(document.getElementById('scaleX').value);
        options.height = barHeightPx / (options.scaleX * 0.3527); 
        
        options.paddingtop = vMargin;
        options.paddingbottom = vMargin;
        options.paddingleft = hMargin;
        options.paddingright = hMargin;
        options.textsize = parseInt(document.getElementById('fontSize').value);
      } else {
        const size2d = parseInt(document.getElementById('size2d').value);
        const margin2d = parseInt(document.getElementById('margin2d').value);
        options.scaleX = size2d / 100; 
        options.scaleY = size2d / 100;
        options.paddingtop = margin2d;
        options.paddingbottom = margin2d;
        options.paddingleft = margin2d;
        options.paddingright = margin2d;
      }
      return options;
    }

    function generateBarcode() {
      const type = document.getElementById('barcodeType').value;
      const text = document.getElementById('barcodeText').value || " ";

      if (!text.trim()) return;

      if (type === 'qrcode') {
        const size = parseInt(document.getElementById('size2d').value);
        const margin = parseInt(document.getElementById('margin2d').value);

        document.getElementById('qrcodeContainer').innerHTML = ''; 
        
        qrCodeInstance = new QRCodeStyling({
          width: size,
          height: size,
          type: "svg", 
          data: text,
          margin: margin, 
          image: uploadedLogoBase64, 
          dotsOptions: { color: "#000000", type: "square" },
          backgroundOptions: { color: "#ffffff" },
          imageOptions: {
            crossOrigin: "anonymous",
            hideBackgroundDots: true, 
            imageSize: 0.3
          },
          qrOptions: {
            typeNumber: 0,
            mode: "Byte",
            errorCorrectionLevel: "Q"
          }
        });
        qrCodeInstance.append(document.getElementById('qrcodeContainer'));
        return;
      }

      const is1D = ['code128', 'ean13', 'code39'].includes(type);
      const options = buildBwipOptions(type, text, is1D);

      try {
        bwipjs.toCanvas('barcodeCanvas', options);
      } catch (e) {
        console.error("條碼渲染錯誤:", e);
      }
    }

    document.getElementById('btnDownloadPNG').addEventListener('click', function() {
      const type = document.getElementById('barcodeType').value;
      if (type === 'qrcode' && qrCodeInstance) {
        qrCodeInstance.download({ name: "barcode_qrcode", extension: "png" });
      } else {
        const canvas = document.getElementById('barcodeCanvas');
        const link = document.createElement('a');
        link.download = `barcode_${type}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    });

    document.getElementById('btnDownloadSVG').addEventListener('click', function() {
      const type = document.getElementById('barcodeType').value;
      if (type === 'qrcode' && qrCodeInstance) {
        qrCodeInstance.download({ name: "barcode_qrcode", extension: "svg" });
      } else {
        const text = document.getElementById('barcodeText').value || " ";
        const is1D = ['code128', 'ean13', 'code39'].includes(type);
        const options = buildBwipOptions(type, text, is1D);

        try {
          const svgOutput = bwipjs.toSVG(options);
          const blob = new Blob([svgOutput], { type: 'image/svg+xml;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `barcode_${type}.svg`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        } catch (e) {
          alert("生成 SVG 失敗");
        }
      }
    });

    updateSliderLabels();
    generateBarcode();
  </script>
</body>
</html>
