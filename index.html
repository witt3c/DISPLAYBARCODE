<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動條碼轉換產生器</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.4.3/dist/bwip-js-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body class="bg-gray-100 p-8">

  <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-md p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <div class="flex flex-col justify-between items-center bg-gray-50 p-6 rounded-lg border border-dashed border-gray-300 min-h-[450px]">
      <h2 class="text-xl font-bold mb-4 self-start">即時預覽</h2>
      
      <div id="preview-container" class="my-auto bg-white p-4 shadow-sm flex items-center justify-center min-w-[200px] min-h-[100px]">
        <canvas id="barcodeCanvas"></canvas>
        <div id="qrcodeContainer" class="hidden"></div>
      </div>

      <div class="w-full grid grid-cols-2 gap-4 mt-6">
        <button id="btnDownloadPNG" class="bg-blue-600 text-white py-2 px-4 rounded shadow hover:bg-blue-700 transition font-medium">下載 PNG 檔</button>
        <button id="btnDownloadSVG" class="bg-green-600 text-white py-2 px-4 rounded shadow hover:bg-green-700 transition font-medium">下載 SVG 檔</button>
      </div>
    </div>

    <div class="space-y-4">
      <h2 class="text-xl font-bold mb-4">條碼設定面板</h2>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">條碼類型</label>
        <select id="barcodeType" class="mt-1 block w-full p-2 border rounded bg-white">
          <option value="code128">Code 128 (預設)</option>
          <option value="ean13">EAN-13</option>
          <option value="code39">Code 39</option>
          <option value="qrcode">QR Code</option>
          <option value="datamatrix">Data Matrix</option>
          <option value="pdf417">PDF417</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">輸入內容</label>
        <input type="text" id="barcodeText" value="12345678" class="mt-1 block w-full p-2 border rounded">
      </div>

      <hr class="border-gray-200 my-4">

      <div id="panel-1d" class="space-y-3">
        <h3 class="font-medium text-gray-600">1D 條碼參數 (單位: px)</h3>
        <div class="grid grid-cols-2 gap-4">
          <label class="block text-sm text-gray-600">條型寬度 (單條密碼度)
            <input type="number" id="scaleX" value="2" min="1" step="1" class="w-full mt-1 p-2 border rounded">
          </label>
          <label class="block text-sm text-gray-600">條型總高度
            <input type="number" id="scaleY" value="10" min="1" step="5" class="w-full mt-1 p-2 border rounded">
          </label>
          <label class="block text-sm text-gray-600">垂直邊距 (上下)
            <input type="number" id="padVertical" value="4" min="0" class="w-full mt-1 p-2 border rounded">
          </label>
          <label class="block text-sm text-gray-600">水平邊距 (左右)
            <input type="number" id="padHorizontal" value="4" min="0" class="w-full mt-1 p-2 border rounded">
          </label>
        </div>
        <label class="block text-sm text-gray-600">字元大小 (pt)
          <input type="number" id="fontSize" value="10" min="6" class="w-full mt-1 p-2 border rounded">
        </label>
      </div>

      <div id="panel-2d" class="space-y-3 hidden">
        <h3 class="font-medium text-gray-600">2D 條碼參數 (單位: px)</h3>
        <div class="grid grid-cols-2 gap-4">
          <label class="block text-sm text-gray-600">整體尺寸 (寬/高)
            <input type="number" id="size2d" value="250" min="50" step="10" class="w-full mt-1 p-2 border rounded">
          </label>
          <label class="block text-sm text-gray-600">周圍邊距 (Margin)
            <input type="number" id="margin2d" value="10" min="0" class="w-full mt-1 p-2 border rounded">
          </label>
        </div>
        <div id="logo-upload-container">
          <label class="block text-sm font-medium text-gray-700">上傳 LOGO 圖片 (僅限 QR Code)</label>
          <input type="file" id="logoFile" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>
      </div>
    </div>

  </div>

  <script>
    // 全域變數儲存使用者上傳的 LOGO Base64 資料
    let uploadedLogoBase64 = null;
    let qrCodeInstance = null;

    // 監聽介面切換
    document.getElementById('barcodeType').addEventListener('change', function(e) {
      const type = e.target.value;
      const is1D = ['code128', 'ean13', 'code39'].includes(type);
      
      // 切換參數面板顯示
      document.getElementById('panel-1d').classList.toggle('hidden', !is1D);
      document.getElementById('panel-2d').classList.toggle('hidden', is1D);
      
      // QR Code 以外的 2D 條碼不支援 LOGO 上傳
      document.getElementById('logo-upload-container').classList.toggle('hidden', type !== 'qrcode');
      
      // 切換預覽元件
      document.getElementById('barcodeCanvas').classList.toggle('hidden', type === 'qrcode');
      document.getElementById('qrcodeContainer').classList.toggle('hidden', type !== 'qrcode');

      generateBarcode();
    });

    // 監聽所有輸入欄位的改變，達成「即時預覽」
    const inputs = ['barcodeText', 'scaleX', 'scaleY', 'padVertical', 'padHorizontal', 'fontSize', 'size2d', 'margin2d'];
    inputs.forEach(id => {
      document.getElementById(id).addEventListener('input', generateBarcode);
    });

    // 處理 LOGO 圖片上傳
    document.getElementById('logoFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          uploadedLogoBase64 = event.target.result;
          generateBarcode(); // 重新渲染 QR Code
        };
        reader.readAsDataURL(file);
      }
    });

    // === 主渲染函式 ===
    function generateBarcode() {
      const type = document.getElementById('barcodeType').value;
      const text = document.getElementById('barcodeText').value || " ";

      if (!text.trim()) return;

      // 1. 如果是 QR Code (使用 qr-code-styling 套件)
      if (type === 'qrcode') {
        const size = parseInt(document.getElementById('size2d').value) || 250;
        const margin = parseInt(document.getElementById('margin2d').value) || 10;

        document.getElementById('qrcodeContainer').innerHTML = ''; // 清空舊預覽
        
        qrCodeInstance = new QRCodeStyling({
          width: size,
          height: size,
          type: "svg", 
          data: text,
          margin: margin,
          image: uploadedLogoBase64, 
          dotsOptions: { color: "#000000", type: "square" },
          backgroundOptions: { color: "#ffffff" },
          imageOptions: {
            crossOrigin: "anonymous",
            hideBackgroundDots: true, 
            imageSize: 0.3
          }
        });
        qrCodeInstance.append(document.getElementById('qrcodeContainer'));
        return;
      }

      // 2. 如果是其他條碼 (使用 bwip-js 套件)
      const typeMapping = {
        code128: 'code128',
        ean13: 'ean13',
        code39: 'code39',
        datamatrix: 'datamatrix',
        pdf417: 'pdf417'
      };

      const is1D = ['code128', 'ean13', 'code39'].includes(type);
      
      let options = {
        bcid: typeMapping[type],
        text: text,
        includetext: is1D, 
        textxalign: 'center',
      };

      // 讀取合併後的邊距
      if (is1D) {
        const vMargin = parseInt(document.getElementById('padVertical').value) || 0;
        const hMargin = parseInt(document.getElementById('padHorizontal').value) || 0;
        const barHeightPx = parseInt(document.getElementById('scaleY').value) || 40;

        options.scaleX = parseFloat(document.getElementById('scaleX').value) || 2;
        
        // 修正高度精度問題：轉為以公厘或細微比例換算，並給予精準整數值
        options.height = barHeightPx / (options.scaleX * 0.3527); // 換算公式，解決原套件 scaleY 1px 過高的問題
        
        options.paddingtop = vMargin;
        options.paddingbottom = vMargin;
        options.paddingleft = hMargin;
        options.paddingright = hMargin;
        options.textsize = parseInt(document.getElementById('fontSize').value) || 11;
      } else {
        // Data Matrix 與 PDF417
        const size2d = parseInt(document.getElementById('size2d').value) || 250;
        const margin2d = parseInt(document.getElementById('margin2d').value) || 10;
        options.scaleX = size2d / 100; 
        options.scaleY = size2d / 100;
        options.paddingtop = margin2d;
        options.paddingbottom = margin2d;
        options.paddingleft = margin2d;
        options.paddingright = margin2d;
      }

      try {
        bwipjs.toCanvas('barcodeCanvas', options);
      } catch (e) {
        console.error("條碼渲染失敗，請確認輸入格式。例如 EAN-13 限制為 12-13 碼數字:", e);
      }
    }

    // === 下載邏輯實作 ===

    // 下載 PNG
    document.getElementById('btnDownloadPNG').addEventListener('click', function() {
      const type = document.getElementById('barcodeType').value;
      
      if (type === 'qrcode' && qrCodeInstance) {
        qrCodeInstance.download({ name: "barcode_qrcode", extension: "png" });
      } else {
        const canvas = document.getElementById('barcodeCanvas');
        const link = document.createElement('a');
        link.download = `barcode_${type}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    });

    // 下載 SVG
    document.getElementById('btnDownloadSVG').addEventListener('click', function() {
      const type = document.getElementById('barcodeType').value;
      
      if (type === 'qrcode' && qrCodeInstance) {
        qrCodeInstance.download({ name: "barcode_qrcode", extension: "svg" });
      } else {
        const text = document.getElementById('barcodeText').value || " ";
        const typeMapping = { code128: 'code128', ean13: 'ean13', code39: 'code39', datamatrix: 'datamatrix', pdf417: 'pdf417' };
        const is1D = ['code128', 'ean13', 'code39'].includes(type);
        
        let options = {
          bcid: typeMapping[type],
          text: text,
          includetext: is1D,
          textxalign: 'center',
        };
        
        if (is1D) {
          const vMargin = parseInt(document.getElementById('padVertical').value) || 0;
          const hMargin = parseInt(document.getElementById('padHorizontal').value) || 0;
          const barHeightPx = parseInt(document.getElementById('scaleY').value) || 40;

          options.scaleX = parseFloat(document.getElementById('scaleX').value) || 2;
          options.height = barHeightPx / (options.scaleX * 0.3527); 
          options.paddingtop = vMargin;
          options.paddingbottom = vMargin;
          options.paddingleft = hMargin;
          options.paddingright = hMargin;
          options.textsize = parseInt(document.getElementById('fontSize').value) || 11;
        } else {
          const size2d = parseInt(document.getElementById('size2d').value) || 250;
          const margin2d = parseInt(document.getElementById('margin2d').value) || 10;
          options.scaleX = size2d / 100;
          options.scaleY = size2d / 100;
          options.paddingtop = margin2d; options.paddingbottom = margin2d; options.paddingleft = margin2d; options.paddingright = margin2d;
        }

        try {
          const svgOutput = bwipjs.toSVG(options);
          const blob = new Blob([svgOutput], { type: 'image/svg+xml;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `barcode_${type}.svg`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        } catch (e) {
          alert("生成 SVG 失敗");
        }
      }
    });

    // 初始化第一次渲染
    generateBarcode();
  </script>
</body>
</html>
